<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b" />
      <stop offset="100%" style="stop-color:#065f46" />
    </linearGradient>
    <linearGradient id="gold_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24" />
      <stop offset="50%" style="stop-color:#f59e0b" />
      <stop offset="100%" style="stop-color:#d97706" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="10" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glass" x="0" y="0" width="100%" height="100%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" />
    </filter>
  </defs>

  <!-- Rounded Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg_grad)" />
  
  <!-- Subtle Inner Glow -->
  <rect x="20" y="20" width="472" height="472" rx="80" stroke="white" stroke-opacity="0.1" stroke-width="2" fill="none" />

  <!-- Abstract Geometric Pattern (Islamic) -->
  <path d="M256 80 L280 180 L380 180 L300 240 L330 340 L256 280 L182 340 L212 240 L132 180 L232 180 Z" fill="white" fill-opacity="0.05" />

  <!-- Main Mosque Silhouette -->
  <g filter="url(#shadow)">
    <!-- Base -->
    <path d="M128 384 H384 V416 H128 Z" fill="url(#gold_grad)" />
    <!-- Dome -->
    <path d="M160 384 C160 280 352 280 352 384" fill="url(#gold_grad)" />
    <!-- Mini Crescent on top -->
    <circle cx="256" cy="270" r="15" fill="url(#gold_grad)" />
    <circle cx="262" cy="265" r="15" fill="#064e3b" />
    <!-- Minarets -->
    <rect x="130" y="280" width="20" height="104" fill="url(#gold_grad)" />
    <path d="M125 280 L140 250 L155 280 Z" fill="url(#gold_grad)" />
    <rect x="362" y="280" width="20" height="104" fill="url(#gold_grad)" />
    <path d="M357 280 L372 250 L387 280 Z" fill="url(#gold_grad)" />
  </g>

  <!-- Clock Outline -->
  <circle cx="256" cy="256" r="210" stroke="url(#gold_grad)" stroke-width="12" stroke-opacity="0.3" />
  
  <!-- Clock Elements inside -->
  <line x1="256" y1="90" x2="256" y2="120" stroke="url(#gold_grad)" stroke-width="8" />
  <line x1="256" y1="392" x2="256" y2="422" stroke="url(#gold_grad)" stroke-width="8" />
  <line x1="90" y2="256" x1="120" y2="256" stroke="url(#gold_grad)" stroke-width="8" />
  <line x1="392" y2="256" x422="y1" x2="256" stroke="url(#gold_grad)" stroke-width="8" />

</svg>
